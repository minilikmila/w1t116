services:
  app:
    build: .
    ports:
      - "5173:5173"
    restart: unless-stopped

  test:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
      - test_node_modules:/app/node_modules
    environment:
      - INSIDE_DOCKER=true
      - CI=true
    profiles:
      - test
    command: ["bash", "./run_tests.sh"]

volumes:
  test_node_modules:
